<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="meter" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="50%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f87171"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="4" y="4" width="248" height="248" rx="48" ry="48" fill="url(#bg)"/>

  <!-- Shared gauge arc geometry so background and colored fill stay perfectly aligned -->
  <path id="gauge-arc" d="M 60 170 A 68 68 0 0 1 196 170" fill="none"/>

  <!-- Gauge arc background -->
  <use href="#gauge-arc" stroke="rgba(255,255,255,0.2)" stroke-width="16" stroke-linecap="round"/>

  <!-- Gauge arc colored fill (about 70% of the same arc path) -->
  <use href="#gauge-arc" stroke="url(#meter)" stroke-width="16" stroke-linecap="round" stroke-dasharray="150 220"/>

  <!-- Gauge needle -->
  <line x1="128" y1="170" x2="172" y2="120" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <circle cx="128" cy="170" r="8" fill="white"/>

  <!-- "T" token symbol -->
  <text x="128" y="224" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="36" font-weight="700" fill="rgba(255,255,255,0.9)" letter-spacing="2">TOKEN</text>

  <!-- Tick marks on gauge -->
  <line x1="60" y1="162" x2="60" y2="155" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round"/>
  <line x1="74" y1="130" x2="78" y2="125" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round"/>
  <line x1="100" y1="108" x2="103" y2="103" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round"/>
  <line x1="128" y1="100" x2="128" y2="94" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round"/>
  <line x1="156" y1="108" x2="153" y2="103" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round"/>
  <line x1="182" y1="130" x2="178" y2="125" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round"/>
  <line x1="196" y1="162" x2="196" y2="155" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round"/>
</svg>
